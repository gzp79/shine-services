<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shine Viewer</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #1a1a2e;
            }
            #app {
                width: 100vw;
                height: 100vh;
                position: relative;
            }
            canvas {
                display: block;
                width: 100%;
                height: 100%;
            }
            #nav {
                position: absolute;
                top: 8px;
                left: 8px;
                z-index: 20;
            }
            #nav select {
                color: #fff;
                font-family: monospace;
                font-size: 14px;
                padding: 6px 12px;
                background: rgba(40, 40, 60, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 4px;
                cursor: pointer;
                outline: none;
            }
            #nav select:hover {
                background: rgba(60, 60, 90, 0.9);
                border-color: rgba(255, 255, 255, 0.5);
            }
            #nav select option {
                background: #2a2a3e;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div id="nav">
            <select id="scene-select">
                <option value="">Game</option>
                <option value="hex-mesh">Hex Mesh</option>
                <option value="cdt">CDT</option>
                <option value="input-events">Input Events</option>
                <option value="trilinear">Trilinear</option>
                <option value="world-neighbors">World Neighbors</option>
            </select>
        </div>
        <div id="app"></div>
        <script type="module">
            const select = document.getElementById('scene-select');

            // Update select based on hash
            function updateSelect() {
                const hash = window.location.hash.replace('#', '');
                select.value = hash;
            }

            // Navigate when select changes
            select.addEventListener('change', () => {
                const value = select.value;
                window.location.hash = value ? `#${value}` : '';
            });

            window.addEventListener('hashchange', updateSelect);
            updateSelect();
        </script>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
