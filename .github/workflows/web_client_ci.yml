name: Web Client CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel outdated builds for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  S3_BUCKET_LINK: https://ce847ac4c44fb11af63e62ba34ec40db.r2.cloudflarestorage.com
  S3_BUCKET_NAME: shine-games

jobs:
  web-client-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Toolchain must be set up before the cargo cache so the cache key
      # matches the active toolchain.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: client/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client/web
        run: pnpm install

      - name: Build
        working-directory: client/web
        run: pnpm build

      - name: Copy viewer
        working-directory: client/web
        run: cp viewer.html dist/viewer.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: client/web/dist/
          retention-days: 1

  deploy:
    needs: web-client-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-client
          path: ./dist

      - name: Upload game assets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync ./dist s3://${S3_BUCKET_NAME}/${{ github.sha }}/ \
            --endpoint-url=${S3_BUCKET_LINK} \
            --cache-control "public, max-age=31536000, immutable" \
            --checksum-algorithm CRC32

      - name: Upload latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          jq -n --arg version "${{ github.sha }}" '{version: $version}' > ./latest.json
          aws s3 cp ./latest.json s3://${S3_BUCKET_NAME}/latest.json \
            --endpoint-url=${S3_BUCKET_LINK} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json"
